<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Emoji-Tu Tiên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-overlay" class="modal-overlay hidden" style="z-index: 1000000; background: radial-gradient(circle, #8b5a2b, #3e2723);">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 10px; text-shadow: 2px 2px 0 #000;">🔐</div>
            <h2 id="auth-title" style="color: #ffd700;">ĐĂNG NHẬP</h2>
            <p id="auth-desc" style="color: #fff;">Chào mừng trở lại! Vui lòng đăng nhập.</p>
            <input type="text" id="auth-name" placeholder="Tên tài khoản..." autocomplete="off">
            <input type="password" id="auth-pass" placeholder="Mật khẩu..." autocomplete="off">
            <button id="auth-action-btn" class="gold-btn">ĐĂNG NHẬP</button>
            <div style="margin-top: 25px; font-size: 1.1rem; color: #ccc;">
                <span id="auth-switch-text">Chưa có tài khoản?</span> 
                <b id="auth-switch-btn" style="color: #00ffff; cursor: pointer; text-decoration: underline;">Đăng ký ngay</b>
            </div>
        </div>
    </div>

    <div id="difficulty-modal" class="modal-overlay hidden" style="z-index: 9999999; backdrop-filter: blur(5px);">
        <div class="modal-content">
            <h2 style="color: #ffd700;">CHUẨN BỊ CHIẾN ĐẤU</h2>
            <div style="margin-bottom: 25px;">
                <p style="color: #00ffff; font-weight: bold; font-size: 1.2rem;">Chọn độ khó:</p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                    <button class="diff-btn active" data-diff="easy">DỄ</button>
                    <button class="diff-btn" data-diff="medium">VỪA</button>
                    <button class="diff-btn" data-diff="hard">KHÓ</button>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="cancel-diff-btn" style="flex: 1; background: #555; color: #fff; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">HỦY</button>
                <button id="start-game-btn" class="gold-btn" style="flex: 1; padding: 12px;">VÀO GAME</button>
            </div>
        </div>
    </div>

    <div class="game-container" id="main-game-ui" style="display: none;">
        
        <div class="left-panel">
            <div class="logo"><span>E</span><span>M</span><span>O</span><span>J</span><span>I</span><span>S</span></div>
            <div id="vc-cr" style="color: #ccc; font-size: 0.8rem; margin-top: -15px; font-weight: bold;">Code By VanCuong</div>
            
            <div id="player-profile-box" class="profile-box">
                <img id="avatar-img" src="https://i.imgur.com/7HnLKEg.png" class="player-avatar-img">
                <div class="profile-info">
                    <span id="player-vip-badge" class="vip-badge">Phàm Nhân</span>
                    <span id="player-name-txt" class="name-txt">Đại Hiệp</span>
                </div>
            </div>

            <div class="stats-wrapper">
                <div class="stat-box"><span class="label">Bàn</span><span class="value" id="level">1</span></div>
                <div class="stat-box"><span class="label">Đổi vị trí</span><span class="value" id="shuffle-count">5</span></div>
                <div class="stat-box"><span class="label">Gợi ý</span><span class="value" id="hint-count">5</span></div>
                <div class="stat-box"><span class="label">Điểm</span><span class="value" id="score">0</span></div>
                <div class="stat-box"><span class="label" style="color: #ffeb3b;">Kỷ lục</span><span class="value" id="high-score" style="color: #ffeb3b;">0</span></div>
            </div>
        </div>

        <div class="center-panel">
            <div class="board-wrapper">
                <svg id="connection-line-layer" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></svg>
                <div id="board" class="board"></div>
            </div>
            
            <div class="footer-panel">
                <button class="footer-btn btn-red" id="sound-btn"><i>🔇</i> <span>Âm thanh</span></button>
                <button class="footer-btn btn-blue" id="pause-btn"><i>⏸️</i> <span>Tạm dừng</span></button>
                <button class="footer-btn btn-yellow" id="hint-btn"><i>💡</i> <span>Gợi ý</span></button>
                <button class="footer-btn btn-green" id="shuffle-btn"><i>🔀</i> <span>Đổi vị trí</span></button>
                <button class="footer-btn btn-gray" id="footer-quit-btn"><i>🚪</i> <span>Thoát</span></button>
            </div>
        </div>

        <div class="right-panel">
            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>
            <span class="timer-label">Thời gian</span>
        </div>

    </div>

   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="javascript/tracker.js"></script>
    <script src="javascript/core.js"></script>
    <script src="javascript/profile.js"></script>
    <script src="javascript/friends.js"></script>
    <script src="javascript/script.js"></script>
    <script src="javascript/admin.js"></script>
    <script src="javascript/shop.js"></script>
    <script src="javascript/daigia.js"></script>
    <script src="javascript/pvp.js"></script>
    <script src="javascript/chat.js"></script>
    <script src="javascript/dangnhap.js"></script>
    <script src="javascript/khung.js"></script>
    <script src="javascript/game.js"></script>
    <script src="javascript/lichsu.js"></script>
    <script src="javascript/nhiemvu.js"></script>
    <script src="javascript/guild.js"></script>
    <script src="javascript/afk.js"></script>
    <script src="javascript/character.js"></script>
    <script src="javascript/world.js"></script>
    <script src="javascript/bag.js"></script>
</body>
</html>
